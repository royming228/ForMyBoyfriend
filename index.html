<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❤️ I Love You</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1 class="title">❤️</h1>
        <p class="subtitle">Нажми на сердечко плиз</p>
        
        <!-- Сердце из слов "I love you" -->
        <div class="heart" id="heart">
            <!-- Строки будут добавлены через JavaScript -->
        </div>

        <!-- Кнопка "Согласна" (появляется после клика) -->
        <button class="btn" id="yesBtn" style="display: none;">
            Да! 💕
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
